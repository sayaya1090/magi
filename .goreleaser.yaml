version: 2

project_name: magi

before:
  hooks:
    - go mod tidy

builds:
  - id: magi
    main: ./cmd/magi
    binary: magi
    env:
      - CGO_ENABLED=0 # pure Go → portable, reproducible cross-compiles
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/sayaya1090/magi/internal/version.Version={{.Version}}
      - -X github.com/sayaya1090/magi/internal/version.Commit={{.ShortCommit}}
      - -X github.com/sayaya1090/magi/internal/version.Date={{.Date}}
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    # Asset base name must match update.AssetName(): magi_<OS>_<arch>
    name_template: "magi_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: sayaya1090
    name: magi

# NOTE: Homebrew tap (brews:) is intentionally omitted for now — it needs a
# separate public homebrew-tap repo and a cross-repo token that the default
# GITHUB_TOKEN can't provide. Re-add when the project goes public with a tap.
