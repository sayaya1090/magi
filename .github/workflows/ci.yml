name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write # the coverage-badge step pushes a JSON to the 'badges' branch

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test (race + coverage)
        # Live Ollama Cloud E2E tests are skipped (-skip E2E), so CI stays hermetic.
        run: |
          set -o pipefail
          go test -race -covermode=atomic -coverprofile=coverage.out -skip E2E ./... | tee test-output.txt

      - name: coverage summary
        if: always()
        run: |
          {
            echo "## 🧪 Test coverage"
            echo ""
            if [ -f coverage.out ]; then
              # internal/eval is a manual, env-gated benchmark harness (its tests skip
              # without MAGI_EVAL_*), not unit-tested production code — exclude it from
              # the coverage tally so it doesn't drag the total/badge down.
              grep -v '/internal/eval/' coverage.out > coverage.prod.out
              total=$(go tool cover -func=coverage.prod.out | tail -1 | awk '{print $NF}')
              echo "### Total: \`${total}\`"
              echo ""
              echo "| Package | Coverage | |"
              echo "|---|---:|:--|"
              # One row per package that HAS tests (lines starting with "ok"), lowest
              # coverage first, with a 🟥/🟨/🟩 status (<50 / <80 / ≥80). Packages with no
              # test files of their own (cmd/magi, interface-only pkgs) report a bare
              # "coverage: 0.0%" without the "ok" prefix and are omitted — there's nothing
              # to test there. A tested package that is genuinely 0% (a real gap) is kept.
              grep -E '^ok\b.*coverage:' test-output.txt \
                | grep -v 'internal/eval' \
                | sed -E 's#github.com/sayaya1090/magi/##' \
                | awk '{
                    for (i=1;i<=NF;i++) if ($i=="coverage:") { p=$(i+1); sub(/%/,"",p) }
                    e="🟥"; if (p+0>=80) e="🟩"; else if (p+0>=50) e="🟨"
                    printf "%06.2f\t| `%s` | %s%% | %s |\n", p+0, $2, p, e
                  }' \
                | sort -n | cut -f2-
            else
              echo "_no coverage profile was produced_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: ignore

      # Publish a shields.io endpoint badge (coverage %) to an orphan 'badges'
      # branch using the default token — no third-party service or extra secret.
      # Runs only on main; the README badge reads badges/coverage.json.
      - name: publish coverage badge
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Exclude the env-gated internal/eval benchmark harness from the badge %.
          grep -v '/internal/eval/' coverage.out > coverage.prod.out
          pct=$(go tool cover -func=coverage.prod.out | tail -1 | awk '{print $NF}' | tr -d '%')
          color=e05d44
          awk "BEGIN{exit !($pct>=80)}" && color=4c1 || awk "BEGIN{exit !($pct>=60)}" && color=dfb317
          tmp=$(mktemp -d)
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "$pct" "$color" > "$tmp/coverage.json"
          cd "$tmp"
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage.json
          git commit -q -m "coverage: ${pct}%"
          git branch -M badges
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" badges
