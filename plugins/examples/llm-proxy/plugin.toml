name = "llm-proxy"
version = "0.1.0"
description = "Routes the agent's LLM traffic through an in-process loopback proxy that logs each request (example: magi.serve + magi.set_base_url)."
entry = "init.lua"
# net:listen        — host the loopback server (magi.serve)
# net:127.0.0.1      — point the agent at it (magi.set_base_url; loopback-only)
# net:localhost      — forward upstream to the real backend (magi.http); match your upstream host
permissions = ["net:listen", "net:127.0.0.1", "net:localhost"]

[config]
# The real OpenAI-compatible backend to forward to. Override in config.toml:
#   [plugins.llm-proxy] upstream = "http://localhost:11434/v1"
upstream = "http://localhost:11434/v1"
